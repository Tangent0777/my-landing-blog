backend:
  name: git-gateway
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  # ── Blog Posts ──────────────────────────────────────────
  - name: "blog"
    label: "Blog Posts"
    folder: "public/content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title",       name: "title",       widget: "string" }
      - { label: "Cover Image", name: "coverImage",  widget: "image", required: false }
      - { label: "Date",        name: "date",        widget: "datetime" }
      - { label: "Author",      name: "author",      widget: "string" }
      - { label: "Excerpt",     name: "excerpt",     widget: "text" }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["Technology","Design","Business","Tutorial","News"]
      - { label: "Body",        name: "body",        widget: "markdown" }
      - { label: "Draft",       name: "draft",       widget: "boolean", default: false }

  # ── Authors ─────────────────────────────────────────────
  - name: "authors"
    label: "Authors"
    folder: "public/content/authors"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Name",     name: "title",    widget: "string" }
      - { label: "Bio",      name: "bio",      widget: "text" }
      - { label: "Avatar",   name: "avatar",   widget: "image", required: false }
      - { label: "Twitter",  name: "twitter",  widget: "string", required: false }

  # ── Pages ────────────────────────────────────────────────
  - name: "pages"
    label: "Pages"
    folder: "public/content/pages"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title",    name: "title",    widget: "string" }
      - { label: "Body",     name: "body",     widget: "markdown" }
      - { label: "Draft",    name: "draft",    widget: "boolean", default: false }

  # ── Site Settings (single file) ──────────────────────────
  - name: "settings"
    label: "Site Settings"
    files:
      - label: "General"
        name: "general"
        file: "public/content/settings/general.json"
        fields:
          - { label: "Site Title",       name: "siteTitle",       widget: "string" }
          - { label: "Site Description", name: "siteDescription", widget: "text" }
          - { label: "Twitter Handle",   name: "twitter",         widget: "string", required: false }